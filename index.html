<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>50-Piece Jigsaw Puzzle</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1e24;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        header {
            margin: 5px 0;
            text-align: center;
            width: 100%;
        }

        h1 {
            margin: 0 0 3px 0;
            font-size: 1.2rem;
        }

        .controls {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 0 10px;
        }

        button {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.95);
        }

        button.active {
            background-color: #e11d48;
        }

        #canvas-container {
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            background: #2d2d35;
            margin-top: 5px;
        }

        canvas {
            display: block;
        }

        .instructions {
            margin-top: 6px;
            font-size: 0.75rem;
            color: #a1a1aa;
            text-align: center;
            max-width: 90%;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <header>
        <h1>Jigsaw Puzzle Solver</h1>
        <div class="controls">
            <button id="rotate-ccw">↺ CCW</button>
            <button id="rotate-cw">↻ CW</button>
            <button id="zoom-toggle" class="active">🔍 Loupe: ON</button>
            <button id="reset-btn">Scramble</button>
        </div>
    </header>

    <div id="canvas-container">
        <canvas id="puzzleCanvas"></canvas>
    </div>

    <div class="instructions">
        <strong>Mobile Tip:</strong> Tap a piece to highlight it, then use <strong>CCW / CW</strong> buttons to spin it. Turn on the <strong>Loupe</strong> to see underneath your thumb!
    </div>

    <script>
        const canvas = document.getElementById('puzzleCanvas');
        const ctx = canvas.getContext('2d');

        const ROWS = 5;
        const COLS = 10;
        
        let pieceWidth, pieceHeight;
        let boardWidth, boardHeight;
        let boardX, boardY;

        let pieces = [];
        let selectedPiece = null;
        let highlightedPiece = null;
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        
        // Touch enhancements
        let lastPointerPos = { x: 0, y: 0 };
        let useLoupe = true;

        const puzzleImg = new Image();
        puzzleImg.src = 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1000&q=80';
        puzzleImg.crossOrigin = "anonymous"; 

        puzzleImg.onload = () => {
            initDimensions();
            createPieces();
            scramblePieces();
            animate();
        };

        window.addEventListener('resize', () => {
            if (puzzleImg.complete) {
                const positions = pieces.map(p => ({
                    currentGridCol: Math.round((p.x - boardX) / pieceWidth),
                    currentGridRow: Math.round((p.y - boardY) / pieceHeight),
                    isSnapped: p.isSnapped,
                    relX: p.x / canvas.width,
                    relY: p.y / canvas.height
                }));

                initDimensions();

                pieces.forEach((p, i) => {
                    p.w = pieceWidth;
                    p.h = pieceHeight;
                    if (positions[i].isSnapped) {
                        p.x = boardX + positions[i].currentGridCol * pieceWidth;
                        p.y = boardY + positions[i].currentGridRow * pieceHeight;
                    } else {
                        p.x = positions[i].relX * canvas.width;
                        p.y = positions[i].relY * canvas.height;
                    }
                });
                checkPositions();
            }
        });

        function initDimensions() {
            // Give layout breathing room on smaller viewports
            const maxW = window.innerWidth * 0.98;
            const maxH = window.innerHeight * 0.72;
            
            // Adjust board size layout rules dynamically for mobile portraits vs landscapes
            const scalar = window.innerWidth < 600 ? 0.75 : 0.6;
            boardWidth = Math.min(maxW * scalar, maxH * 2 * scalar); 
            boardHeight = boardWidth / 2;

            pieceWidth = boardWidth / COLS;
            pieceHeight = boardHeight / ROWS;

            canvas.width = maxW;
            canvas.height = maxH;

            boardX = (canvas.width - boardWidth) / 2;
            boardY = (canvas.height - boardHeight) / 2;
        }

        class Piece {
            constructor(id, r, c) {
                this.id = id;
                this.r = r; 
                this.c = c; 
                this.x = 0; 
                this.y = 0; 
                this.w = pieceWidth;
                this.h = pieceHeight;
                this.rotation = 0; 
                this.isSnapped = false; 
                this.isCorrect = false; 
            }

            draw(customCtx = ctx, ox = 0, oy = 0) {
                customCtx.save();
                
                // If rendering inside the magnifier lens frame context, offset positions
                if (customCtx !== ctx) {
                    customCtx.translate(ox, oy);
                } else {
                    customCtx.translate(this.x + this.w / 2, this.y + this.h / 2);
                }
                
                customCtx.rotate((this.rotation * Math.PI) / 180);

                if (highlightedPiece === this && customCtx === ctx) {
                    customCtx.shadowColor = "#e11d48";
                    customCtx.shadowBlur = 15;
                    customCtx.lineWidth = 3;
                    customCtx.strokeStyle = "#f43f5e";
                } else {
                    customCtx.shadowColor = "rgba(0,0,0,0.4)";
                    customCtx.shadowBlur = 4;
                    customCtx.lineWidth = 1;
                    customCtx.strokeStyle = this.isSnapped ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.4)";
                }

                customCtx.beginPath();
                customCtx.rect(-this.w / 2, -this.h / 2, this.w, this.h);
                customCtx.fill(); 
                customCtx.stroke();
                
                const sx = (this.c * puzzleImg.width) / COLS;
                const sy = (this.r * puzzleImg.height) / ROWS;
                const sw = puzzleImg.width / COLS;
                const sh = puzzleImg.height / ROWS;

                customCtx.drawImage(puzzleImg, sx, sy, sw, sh, -this.w / 2, -this.h / 2, this.w, this.h);
                customCtx.stroke();

                customCtx.restore();
            }

            isMouseOver(mx, my) {
                // Expanded touch target padding margin check to allow easier picking on small screens
                const pad = 6; 
                return mx >= this.x - pad && mx <= this.x + this.w + pad && my >= this.y - pad && my <= this.y + this.h + pad;
            }

            snapCheck() {
                const midX = this.x + this.w / 2;
                const midY = this.y + this.h / 2;

                if (midX >= boardX && midX <= boardX + boardWidth && midY >= boardY && midY <= boardY + boardHeight) {
                    const closestCol = Math.floor((midX - boardX) / this.w);
                    const closestRow = Math.floor((midY - boardY) / this.h);

                    if (closestCol >= 0 && closestCol < COLS && closestRow >= 0 && closestRow < ROWS) {
                        this.x = boardX + closestCol * this.w;
                        this.y = boardY + closestRow * this.h;
                        this.isSnapped = true;
                        return;
                    }
                }
                this.isSnapped = false;
            }
        }

        function createPieces() {
            pieces = [];
            let id = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    pieces.push(new Piece(id++, r, c));
                }
            }
        }

        function scramblePieces() {
            pieces.forEach(p => {
                p.rotation = Math.floor(Math.random() * 4) * 90;
                p.isSnapped = false;
                p.isCorrect = false;

                // Keeps pieces fully inside the canvas boundary limits
                p.x = Math.random() * (canvas.width - p.w);
                p.y = Math.random() * (canvas.height - p.h);
                
                // Prevent scattering directly over the center board at launch if room allows
                if(p.x + p.w > boardX && p.x < boardX + boardWidth && p.y + p.h > boardY && p.y < boardY + boardHeight) {
                    p.y = Math.random() > 0.5 ? Math.random() * (boardY - p.h) : boardY + boardHeight + Math.random() * (canvas.height - boardY - boardHeight - p.h);
                }
            });
            highlightedPiece = null;
            selectedPiece = null;
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function handlePointerDown(e) {
            const pos = getMousePos(e);
            lastPointerPos = pos;
            
            selectedPiece = null;
            for (let i = pieces.length - 1; i >= 0; i--) {
                let p = pieces[i];
                if (p.isMouseOver(pos.x, pos.y)) {
                    selectedPiece = p;
                    highlightedPiece = p;
                    isDragging = true;
                    dragOffsetX = pos.x - p.x;
                    dragOffsetY = pos.y - p.y;
                    
                    pieces.splice(i, 1);
                    pieces.push(selectedPiece);
                    break;
                }
            }
            if(!selectedPiece && !e.touches) highlightedPiece = null; 
        }

        function handlePointerMove(e) {
            if (!isDragging || !selectedPiece) return;
            if(e.cancelable) e.preventDefault();

            const pos = getMousePos(e);
            lastPointerPos = pos;

            selectedPiece.x = pos.x - dragOffsetX;
            selectedPiece.y = pos.y - dragOffsetY;

            selectedPiece.x = Math.max(0, Math.min(canvas.width - selectedPiece.w, selectedPiece.x));
            selectedPiece.y = Math.max(0, Math.min(canvas.height - selectedPiece.h, selectedPiece.y));
        }

        function handlePointerUp() {
            if (selectedPiece) {
                selectedPiece.snapCheck();
                selectedPiece = null;
                checkPositions();
            }
            isDragging = false;
        }

        function rotatePiece(dir) {
            let target = selectedPiece || highlightedPiece;
            if (target) {
                target.rotation += dir === 'cw' ? 90 : -90;
                if (target.isSnapped) target.snapCheck();
                checkPositions();
            }
        }

        function drawLoupe() {
            if (!isDragging || !selectedPiece || !useLoupe) return;

            // Positioning magnifier glass above touch coordinate vectors safely
            const radius = 65;
            const zoomFactor = 1.8;
            const loupeX = lastPointerPos.x;
            const loupeY = lastPointerPos.y - radius - 35; 

            ctx.save();
            
            // Create circular clipping path
            ctx.beginPath();
            ctx.arc(loupeX, loupeY, radius, 0, Math.PI * 2);
            ctx.closePath();
            
            // Outer frame design aesthetics
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#4f46e5';
            ctx.fillStyle = '#232329';
            ctx.fill();
            ctx.stroke();
            ctx.clip();

            // Zoomed render transformation equations
            ctx.translate(loupeX, loupeY);
            ctx.scale(zoomFactor, zoomFactor);
            ctx.translate(-lastPointerPos.x, -lastPointerPos.y);

            // Redraw background grids in magnifier field
            ctx.fillStyle = '#232329';
            ctx.fillRect(boardX, boardY, boardWidth, boardHeight);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath(); ctx.moveTo(boardX + i * pieceWidth, boardY); ctx.lineTo(boardX + i * pieceWidth, boardY + boardHeight); ctx.stroke();
            }
            for (let j = 0; j <= ROWS; j++) {
                ctx.beginPath(); ctx.moveTo(boardX, boardY + j * pieceHeight); ctx.lineTo(boardX + boardWidth, boardY + j * pieceHeight); ctx.stroke();
            }

            // Draw items into the zoom viewport container 
            pieces.forEach(p => {
                if (p !== selectedPiece) {
                    p.draw();
                }
            });

            // Draw active moving piece inside loupe coordinates 
            if (selectedPiece) {
                selectedPiece.draw(ctx, selectedPiece.x + selectedPiece.w / 2, selectedPiece.y + selectedPiece.h / 2);
            }

            ctx.restore();
            
            // Draw Target crosshairs indicator inside loop glass context
            ctx.strokeStyle = 'rgba(244, 63, 94, 0.6)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(loupeX, loupeY, 4, 0, Math.PI*2);
            ctx.stroke();
        }

        function checkPositions() {
            let totalCorrect = 0;
            pieces.forEach(p => {
                let normalizedRotation = ((p.rotation % 360) + 360) % 360;
                const currentGridCol = Math.round((p.x - boardX) / pieceWidth);
                const currentGridRow = Math.round((p.y - boardY) / pieceHeight);

                if (p.isSnapped && normalizedRotation === 0 && currentGridCol === p.c && currentGridRow === p.r) {
                    p.isCorrect = true;
                    totalCorrect++;
                } else {
                    p.isCorrect = false;
                }
            });
            if (totalCorrect === pieces.length) {
                setTimeout(() => alert('🎉 Outstanding! You completed the puzzle!'), 200);
            }
        }

        // Event Handling Triggers
        canvas.addEventListener('mousedown', handlePointerDown);
        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);

        canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
        window.addEventListener('touchmove', handlePointerMove, { passive: false });
        window.addEventListener('touchend', handlePointerUp);

        canvas.addEventListener('wheel', (e) => {
            if (selectedPiece) {
                e.preventDefault(); 
                rotatePiece(e.deltaY < 0 ? 'ccw' : 'cw');
            }
        }, { passive: false });

        document.getElementById('rotate-cw').addEventListener('click', () => rotatePiece('cw'));
        document.getElementById('rotate-ccw').addEventListener('click', () => rotatePiece('ccw'));
        document.getElementById('reset-btn').addEventListener('click', scramblePieces);
        
        const zoomBtn = document.getElementById('zoom-toggle');
        zoomBtn.addEventListener('click', () => {
            useLoupe = !useLoupe;
            zoomBtn.classList.toggle('active', useLoupe);
            zoomBtn.innerText = useLoupe ? "🔍 Loupe: ON" : "🔍 Loupe: OFF";
        });

        window.addEventListener('keydown', (e) => {
            if(e.key === 'r' || e.key === 'R' || e.key === 'ArrowRight') rotatePiece('cw');
            if(e.key === 'ArrowLeft') rotatePiece('ccw');
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Board Base
            ctx.fillStyle = '#232329';
            ctx.fillRect(boardX, boardY, boardWidth, boardHeight);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 1; i < COLS; i++) {
                ctx.beginPath(); ctx.moveTo(boardX + i * pieceWidth, boardY); ctx.lineTo(boardX + i * pieceWidth, boardY + boardHeight); ctx.stroke();
            }
            for (let j = 1; j < ROWS; j++) {
                ctx.beginPath(); ctx.moveTo(boardX, boardY + j * pieceHeight); ctx.lineTo(boardX + boardWidth, boardY + j * pieceHeight); ctx.stroke();
            }
            
            ctx.strokeStyle = '#4f46e5';
            ctx.lineWidth = 3;
            ctx.strokeRect(boardX, boardY, boardWidth, boardHeight);

            // Render Puzzle Pieces
            pieces.forEach(piece => piece.draw());

            // Render Magnifier Glass Layer over top of regular layout
            drawLoupe();

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
