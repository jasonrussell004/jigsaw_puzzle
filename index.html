<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>50-Piece Jigsaw Puzzle</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1e24;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        header {
            margin: 10px 0;
            text-align: center;
            width: 100%;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            touch-action: manipulation;
        }

        button:hover {
            background-color: #4338ca;
        }

        #canvas-container {
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            background: #2d2d35;
        }

        canvas {
            display: block;
        }

        .instructions {
            margin-top: 8px;
            font-size: 0.8rem;
            color: #a1a1aa;
            text-align: center;
            max-width: 90%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Jigsaw Puzzle Solver</h1>
        <div class="controls">
            <button id="rotate-ccw">↺ Rotate CCW</button>
            <button id="rotate-cw">↻ Rotate CW</button>
            <button id="reset-btn">Scramble / New Game</button>
        </div>
    </header>

    <div id="canvas-container">
        <canvas id="puzzleCanvas"></canvas>
    </div>

    <div class="instructions">
        <strong>Mobile Controls:</strong> Use 2 fingers to <strong>Pinch to Zoom</strong> and <strong>Drag to Pan</strong> around the board. <br>
        Use 1 finger to drag and place pieces. Tap a piece to highlight it, then use buttons to rotate.
    </div>

    <script>
        const canvas = document.getElementById('puzzleCanvas');
        const ctx = canvas.getContext('2d');

        const ROWS = 5;
        const COLS = 10;
        
        let pieceWidth, pieceHeight;
        let boardWidth, boardHeight;
        let boardX, boardY;

        let pieces = [];
        let selectedPiece = null;
        let highlightedPiece = null;
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        // Viewport Transform State (Zoom & Pan)
        let scale = 1;
        let panX = 0;
        let panY = 0;
        let isPanning = false;
        let startPanX = 0;
        let startPanY = 0;
        let startTouchDist = 0;
        let startScale = 1;

        const puzzleImg = new Image();
        puzzleImg.src = 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1000&q=80';
        puzzleImg.crossOrigin = "anonymous"; 

        puzzleImg.onload = () => {
            initDimensions();
            createPieces();
            scramblePieces();
            animate();
        };

        window.addEventListener('resize', () => {
            if (puzzleImg.complete) {
                const positions = pieces.map(p => ({
                    currentGridCol: Math.round((p.x - boardX) / pieceWidth),
                    currentGridRow: Math.round((p.y - boardY) / pieceHeight),
                    isSnapped: p.isSnapped,
                    relX: p.x / canvas.width,
                    relY: p.y / canvas.height
                }));

                initDimensions();

                pieces.forEach((p, i) => {
                    p.w = pieceWidth;
                    p.h = pieceHeight;
                    if (positions[i].isSnapped) {
                        p.x = boardX + positions[i].currentGridCol * pieceWidth;
                        p.y = boardY + positions[i].currentGridRow * pieceHeight;
                    } else {
                        p.x = positions[i].relX * canvas.width;
                        p.y = positions[i].relY * canvas.height;
                    }
                });
                checkPositions();
            }
        });

        function initDimensions() {
            const maxW = window.innerWidth * 0.95;
            const maxH = window.innerHeight * 0.70;
            
            boardWidth = Math.min(maxW * 0.6, maxH * 2 * 0.6); 
            boardHeight = boardWidth / 2;

            pieceWidth = boardWidth / COLS;
            pieceHeight = boardHeight / ROWS;

            canvas.width = maxW;
            canvas.height = maxH;

            boardX = (canvas.width - boardWidth) / 2;
            boardY = (canvas.height - boardHeight) / 2;
        }

        class Piece {
            constructor(id, r, c) {
                this.id = id;
                this.r = r; 
                this.c = c; 
                this.x = 0; 
                this.y = 0; 
                this.w = pieceWidth;
                this.h = pieceHeight;
                this.rotation = 0; 
                this.isSnapped = false; 
                this.isCorrect = false; 
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
                ctx.rotate((this.rotation * Math.PI) / 180);

                if (highlightedPiece === this) {
                    ctx.shadowColor = "#e11d48";
                    ctx.shadowBlur = 15 / scale; // Scale shadow size
                    ctx.lineWidth = 3 / scale;
                    ctx.strokeStyle = "#f43f5e";
                } else {
                    ctx.shadowColor = "rgba(0,0,0,0.4)";
                    ctx.shadowBlur = 6 / scale;
                    ctx.lineWidth = 1 / scale;
                    ctx.strokeStyle = this.isSnapped ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.3)";
                }

                ctx.beginPath();
                ctx.rect(-this.w / 2, -this.h / 2, this.w, this.h);
                ctx.fill(); 
                ctx.stroke();
                
                const sx = (this.c * puzzleImg.width) / COLS;
                const sy = (this.r * puzzleImg.height) / ROWS;
                const sw = puzzleImg.width / COLS;
                const sh = puzzleImg.height / ROWS;

                ctx.drawImage(puzzleImg, sx, sy, sw, sh, -this.w / 2, -this.h / 2, this.w, this.h);
                ctx.stroke();

                ctx.restore();
            }

            isMouseOver(mx, my) {
                const pad = 4 / scale; // Adjust touch target dynamically based on zoom level
                return mx >= this.x - pad && mx <= this.x + this.w + pad && my >= this.y - pad && my <= this.y + this.h + pad;
            }

            snapCheck() {
                const midX = this.x + this.w / 2;
                const midY = this.y + this.h / 2;

                if (midX >= boardX && midX <= boardX + boardWidth && midY >= boardY && midY <= boardY + boardHeight) {
                    const closestCol = Math.floor((midX - boardX) / this.w);
                    const closestRow = Math.floor((midY - boardY) / this.h);

                    if (closestCol >= 0 && closestCol < COLS && closestRow >= 0 && closestRow < ROWS) {
                        this.x = boardX + closestCol * this.w;
                        this.y = boardY + closestRow * this.h;
                        this.isSnapped = true;
                        return;
                    }
                }
                this.isSnapped = false;
            }
        }

        function createPieces() {
            pieces = [];
            let id = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    pieces.push(new Piece(id++, r, c));
                }
            }
        }

        function scramblePieces() {
            pieces.forEach(p => {
                p.rotation = Math.floor(Math.random() * 4) * 90;
                p.isSnapped = false;
                p.isCorrect = false;
                p.x = Math.random() * (canvas.width - p.w);
                p.y = Math.random() * (canvas.height - p.h);
            });
            scale = 1;
            panX = 0;
            panY = 0;
            highlightedPiece = null;
            selectedPiece = null;
        }

        // Converts screen pixels to world canvas space coordinates taking current pan & zoom into account
        function screenToWorld(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (clientX - rect.left - panX) / scale,
                y: (clientY - rect.top - panY) / scale
            };
        }

        function handlePointerDown(e) {
            if (e.touches && e.touches.length === 2) {
                // Two-finger gesture initialized: Switch to Panning/Zooming mode
                isDragging = false;
                selectedPiece = null;
                isPanning = true;
                
                const t1 = e.touches[0];
                const t2 = e.touches[1];
                
                startTouchDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                startScale = scale;
                
                // Track midpoints for center anchor panning
                startPanX = ((t1.clientX + t2.clientX) / 2) - panX;
                startPanY = ((t1.clientY + t2.clientY) / 2) - panY;
                return;
            }

            // Normal single finger / mouse down interaction logic
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const worldPos = screenToWorld(clientX, clientY);
            
            selectedPiece = null;
            for (let i = pieces.length - 1; i >= 0; i--) {
                let p = pieces[i];
                if (p.isMouseOver(worldPos.x, worldPos.y)) {
                    selectedPiece = p;
                    highlightedPiece = p;
                    isDragging = true;
                    dragOffsetX = worldPos.x - p.x;
                    dragOffsetY = worldPos.y - p.y;
                    
                    pieces.splice(i, 1);
                    pieces.push(selectedPiece);
                    break;
                }
            }
            if(!selectedPiece && !e.touches) highlightedPiece = null; 
        }

        function handlePointerMove(e) {
            if(e.cancelable) e.preventDefault();

            if (isPanning && e.touches && e.touches.length === 2) {
                const t1 = e.touches[0];
                const t2 = e.touches[1];
                
                // Handle Zoom
                const currentDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                scale = Math.max(0.5, Math.min(4, startScale * (currentDist / startTouchDist)));
                
                // Handle Pan alongside zoom tracking
                const midX = (t1.clientX + t2.clientX) / 2;
                const midY = (t1.clientY + t2.clientY) / 2;
                panX = midX - startPanX;
                panY = midY - startPanY;
                return;
            }

            if (!isDragging || !selectedPiece) return;

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const worldPos = screenToWorld(clientX, clientY);

            selectedPiece.x = worldPos.x - dragOffsetX;
            selectedPiece.y = worldPos.y - dragOffsetY;

            // Enforce canvas limits
            selectedPiece.x = Math.max(0, Math.min(canvas.width - selectedPiece.w, selectedPiece.x));
            selectedPiece.y = Math.max(0, Math.min(canvas.height - selectedPiece.h, selectedPiece.y));
        }

        function handlePointerUp(e) {
            if (e.touches && e.touches.length > 0) {
                // If dropping back down to 1 finger, gracefully clear pan variables
                isPanning = false;
                return;
            }
            if (selectedPiece) {
                selectedPiece.snapCheck();
                selectedPiece = null;
                checkPositions();
            }
            isDragging = false;
            isPanning = false;
        }

        function rotatePiece(dir) {
            let target = selectedPiece || highlightedPiece;
            if (target) {
                target.rotation += dir === 'cw' ? 90 : -90;
                if (target.isSnapped) target.snapCheck();
                checkPositions();
            }
        }

        function checkPositions() {
            let totalCorrect = 0;
            pieces.forEach(p => {
                let normalizedRotation = ((p.rotation % 360) + 360) % 360;
                const currentGridCol = Math.round((p.x - boardX) / pieceWidth);
                const currentGridRow = Math.round((p.y - boardY) / pieceHeight);

                if (p.isSnapped && normalizedRotation === 0 && currentGridCol === p.c && currentGridRow === p.r) {
                    p.isCorrect = true;
                    totalCorrect++;
                } else {
                    p.isCorrect = false;
                }
            });
            if (totalCorrect === pieces.length) {
                setTimeout(() => alert('🎉 Outstanding! You completed the puzzle!'), 200);
            }
        }

        // Mouse Listeners
        canvas.addEventListener('mousedown', handlePointerDown);
        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);

        // Touch Listeners
        canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
        window.addEventListener('touchmove', handlePointerMove, { passive: false });
        window.addEventListener('touchend', handlePointerUp);

        // Double Duty Wheel Listener (Rotates piece if holding one, zooms canvas if hovering background)
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault(); 
            if (selectedPiece) {
                rotatePiece(e.deltaY < 0 ? 'ccw' : 'cw');
            } else {
                // Background Desktop Zoom Utility
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
                const nextScale = Math.max(0.5, Math.min(4, scale * zoomFactor));

                // Anchor zoom transformations around mouse cursor
                panX = mouseX - (mouseX - panX) * (nextScale / scale);
                panY = mouseY - (mouseY - panY) * (nextScale / scale);
                scale = nextScale;
            }
        }, { passive: false });

        // Button Listeners
        document.getElementById('rotate-cw').addEventListener('click', () => rotatePiece('cw'));
        document.getElementById('rotate-ccw').addEventListener('click', () => rotatePiece('ccw'));
        document.getElementById('reset-btn').addEventListener('click', scramblePieces);

        window.addEventListener('keydown', (e) => {
            if(e.key === 'r' || e.key === 'R' || e.key === 'ArrowRight') rotatePiece('cw');
            if(e.key === 'ArrowLeft') rotatePiece('ccw');
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            // Inject coordinate space modifications globally
            ctx.translate(panX, panY);
            ctx.scale(scale, scale);

            // 1. Draw Board Grid Lines
            ctx.fillStyle = '#232329';
            ctx.fillRect(boardX, boardY, boardWidth, boardHeight);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 1; i < COLS; i++) {
                ctx.beginPath(); ctx.moveTo(boardX + i * pieceWidth, boardY); ctx.lineTo(boardX + i * pieceWidth, boardY + boardHeight); ctx.stroke();
            }
            for (let j = 1; j < ROWS; j++) {
                ctx.beginPath(); ctx.moveTo(boardX, boardY + j * pieceHeight); ctx.lineTo(boardX + boardWidth, boardY + j * pieceHeight); ctx.stroke();
            }
            
            ctx.strokeStyle = '#4f46e5';
            ctx.lineWidth = 3;
            ctx.strokeRect(boardX, boardY, boardWidth, boardHeight);

            // 2. Draw Pieces
            pieces.forEach(piece => piece.draw());

            ctx.restore();

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
