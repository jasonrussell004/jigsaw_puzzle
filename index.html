<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>50-Piece Jigsaw Puzzle</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1e24;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        header {
            margin: 10px 0;
            text-align: center;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #4338ca;
        }

        button:disabled {
            background-color: #4b5563;
            cursor: not-allowed;
        }

        #canvas-container {
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            background: #2d2d35;
        }

        canvas {
            display: block;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        .instructions {
            margin-top: 8px;
            font-size: 0.8rem;
            color: #a1a1aa;
            text-align: center;
            max-width: 90%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Jigsaw Puzzle Solver</h1>
        <div class="controls">
            <button id="rotate-ccw">↺ Rotate CCW</button>
            <button id="rotate-cw">↻ Rotate CW</button>
            <button id="reset-btn">Scramble / New Game</button>
        </div>
    </header>

    <div id="canvas-container">
        <canvas id="puzzleCanvas"></canvas>
    </div>

    <div class="instructions">
        <strong>Controls:</strong> Drag pieces with mouse/finger. Click/tap to highlight. <br>
        Press buttons or <strong>Scroll Wheel</strong> while holding a piece to rotate. Snaps into the center grid!
    </div>

    <script>
        const canvas = document.getElementById('puzzleCanvas');
        const ctx = canvas.getContext('2d');

        // Layout Config (5x10 grid = 50 pieces)
        const ROWS = 5;
        const COLS = 10;
        const TOTAL_PIECES = ROWS * COLS;
        
        // Dynamic sizing based on window
        let pieceWidth, pieceHeight;
        let boardWidth, boardHeight;
        let boardX, boardY;

        let pieces = [];
        let selectedPiece = null;
        let highlightedPiece = null;
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        // Load a placeholder high-quality image from Unsplash
        const puzzleImg = new Image();
        puzzleImg.src = 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1000&q=80';
        puzzleImg.crossOrigin = "anonymous"; // Handle CORS if changing source

        puzzleImg.onload = () => {
            initDimensions();
            createPieces();
            scramblePieces();
            animate();
        };

        window.addEventListener('resize', () => {
            if (puzzleImg.complete) {
                // Save relative positions before resizing
                const positions = pieces.map(p => ({x: p.x / canvas.width, y: p.y / canvas.height}));
                initDimensions();
                // Restore relative positions
                pieces.forEach((p, i) => {
                    p.x = positions[i].x * canvas.width;
                    p.y = positions[i].y * canvas.height;
                    p.w = pieceWidth;
                    p.h = pieceHeight;
                });
            }
        });

        function initDimensions() {
            // Scale canvas to fit viewport comfortably
            const maxW = window.innerWidth * 0.95;
            const maxH = window.innerHeight * 0.70;
            
            // Base aspect ratio of the board (10:5 -> 2:1)
            boardWidth = Math.min(maxW * 0.6, maxH * 2 * 0.6); 
            boardHeight = boardWidth / 2;

            pieceWidth = boardWidth / COLS;
            pieceHeight = boardHeight / ROWS;

            // Total canvas size leaves room around the board for loose pieces
            canvas.width = Math.min(maxW, boardWidth * 1.6);
            canvas.height = Math.min(maxH, boardHeight * 1.8);

            // Center the puzzle board on the canvas
            boardX = (canvas.width - boardWidth) / 2;
            boardY = (canvas.height - boardHeight) / 2;
        }

        class Piece {
            constructor(id, r, c) {
                this.id = id;
                this.r = r; // Correct row
                this.c = c; // Correct col
                this.x = 0; // Current canvas X
                this.y = 0; // Current canvas Y
                this.w = pieceWidth;
                this.h = pieceHeight;
                this.rotation = 0; // 0, 90, 180, 270 degrees
                this.isCorrect = false;
            }

            draw() {
                ctx.save();
                // Move to center of piece for rotation tracking
                ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
                ctx.rotate((this.rotation * Math.PI) / 180);

                // Highlight Effect
                if (highlightedPiece === this) {
                    ctx.shadowColor = "#e11d48";
                    ctx.shadowBlur = 15;
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = "#f43f5e";
                } else {
                    ctx.shadowColor = "rgba(0,0,0,0.3)";
                    ctx.shadowBlur = 5;
                    ctx.lineWidth = 1;
                    ctx.strokeStyle = "rgba(255,255,255,0.4)";
                }

                // Draw snippet of image
                ctx.beginPath();
                ctx.rect(-this.w / 2, -this.h / 2, this.w, this.h);
                ctx.fill(); // For shadow clipping
                ctx.stroke();
                
                // Crop math on original image source
                const sx = (this.c * puzzleImg.width) / COLS;
                const sy = (this.r * puzzleImg.height) / ROWS;
                const sw = puzzleImg.width / COLS;
                const sh = puzzleImg.height / ROWS;

                ctx.drawImage(puzzleImg, sx, sy, sw, sh, -this.w / 2, -this.h / 2, this.w, this.h);
                ctx.stroke();

                ctx.restore();
            }

            isMouseOver(mx, my) {
                // Accurate bounds check accounting for center-origin logic
                return mx >= this.x && mx <= this.x + this.w && my >= this.y && my <= this.y + this.h;
            }

            snapCheck() {
                // Calculate where this piece belongs on the canvas grid
                const targetX = boardX + this.c * this.w;
                const targetY = boardY + this.r * this.h;
                
                const distance = Math.hypot(this.x - targetX, this.y - targetY);

                // Snap if within 25px tolerance and rotated correctly
                if (distance < 25 && this.rotation % 360 === 0) {
                    this.x = targetX;
                    this.y = targetY;
                    this.isCorrect = true;
                    if (highlightedPiece === this) highlightedPiece = null;
                } else {
                    this.isCorrect = false;
                }
            }
        }

        function createPieces() {
            pieces = [];
            let id = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    pieces.push(new Piece(id++, r, c));
                }
            }
        }

        function scramblePieces() {
            pieces.forEach(p => {
                // Assign random rotations in 90-degree increments
                p.rotation = Math.floor(Math.random() * 4) * 90;
                p.isCorrect = false;

                // Place outside the target center board layout area
                let side = Math.floor(Math.random() * 4);
                if (side === 0) { // Top
                    p.x = Math.random() * (canvas.width - p.w);
                    p.y = Math.random() * (boardY - p.h);
                } else if (side === 1) { // Bottom
                    p.x = Math.random() * (canvas.width - p.w);
                    p.y = boardY + boardHeight + Math.random() * (canvas.height - (boardY + boardHeight) - p.h);
                } else if (side === 2) { // Left
                    p.x = Math.random() * (boardX - p.w);
                    p.y = Math.random() * (canvas.height - p.h);
                } else { // Right
                    p.x = boardX + boardWidth + Math.random() * (canvas.width - (boardX + boardWidth) - p.w);
                    p.y = Math.random() * (canvas.height - p.h);
                }
            });
            highlightedPiece = null;
            selectedPiece = null;
        }

        // --- Interaction Logic ---

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            // Support both mouse events and touch vectors
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function handlePointerDown(e) {
            const pos = getMousePos(e);
            
            // Cycle backward through array to select topmost rendered layer
            selectedPiece = null;
            for (let i = pieces.length - 1; i >= 0; i--) {
                let p = pieces[i];
                if (!p.isCorrect && p.isMouseOver(pos.x, pos.y)) {
                    selectedPiece = p;
                    highlightedPiece = p;
                    isDragging = true;
                    dragOffsetX = pos.x - p.x;
                    dragOffsetY = pos.y - p.y;
                    
                    // Pop piece to the top of the stack layer arrays
                    pieces.splice(i, 1);
                    pieces.push(selectedPiece);
                    break;
                }
            }
            if(!selectedPiece) highlightedPiece = null; // tapped empty space
        }

        function handlePointerMove(e) {
            if (!isDragging || !selectedPiece) return;
            // Prevent scrolling on mobile devices while dragging
            if(e.cancelable) e.preventDefault();

            const pos = getMousePos(e);
            selectedPiece.x = pos.x - dragOffsetX;
            selectedPiece.y = pos.y - dragOffsetY;

            // Enforce canvas borders bounding box
            selectedPiece.x = Math.max(0, Math.min(canvas.width - selectedPiece.w, selectedPiece.x));
            selectedPiece.y = Math.max(0, Math.min(canvas.height - selectedPiece.h, selectedPiece.y));
        }

        function handlePointerUp() {
            if (selectedPiece) {
                selectedPiece.snapCheck();
                selectedPiece = null;
                checkWinCondition();
            }
            isDragging = false;
        }

        function rotatePiece(dir) {
            let target = selectedPiece || highlightedPiece;
            if (target && !target.isCorrect) {
                target.rotation += dir === 'cw' ? 90 : -90;
                target.snapCheck();
                checkWinCondition();
            }
        }

        function checkWinCondition() {
            const win = pieces.every(p => p.isCorrect);
            if(win) {
                setTimeout(() => alert('🎉 Outstanding! You completed the puzzle!'), 200);
            }
        }

        // --- Event Listeners Bindings ---

        // Mouse Listeners
        canvas.addEventListener('mousedown', handlePointerDown);
        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);

        // Touch Listeners
        canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
        window.addEventListener('touchmove', handlePointerMove, { passive: false });
        window.addEventListener('touchend', handlePointerUp);

        // Scroll Wheel Rotation Engine
        canvas.addEventListener('wheel', (e) => {
            if (selectedPiece) {
                e.preventDefault(); 
                rotatePiece(e.deltaY < 0 ? 'ccw' : 'cw');
            }
        }, { passive: false });

        // Button Controls
        document.getElementById('rotate-cw').addEventListener('click', () => rotatePiece('cw'));
        document.getElementById('rotate-ccw').addEventListener('click', () => rotatePiece('ccw'));
        document.getElementById('reset-btn').addEventListener('click', scramblePieces);

        // Keyboard Fallback (Arrow Keys or R for Rotation)
        window.addEventListener('keydown', (e) => {
            if(e.key === 'r' || e.key === 'R' || e.key === 'ArrowRight') rotatePiece('cw');
            if(e.key === 'ArrowLeft') rotatePiece('ccw');
        });

        // --- Main Game Render Loop ---
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Target Grid Gridlines Placement Board Frame
            ctx.fillStyle = '#232329';
            ctx.fillRect(boardX, boardY, boardWidth, boardHeight);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 1; i < COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(boardX + i * pieceWidth, boardY);
                ctx.lineTo(boardX + i * pieceWidth, boardY + boardHeight);
                ctx.stroke();
            }
            for (let j = 1; j < ROWS; j++) {
                ctx.beginPath();
                ctx.moveTo(boardX, boardY + j * pieceHeight);
                ctx.lineTo(boardX + boardWidth, boardY + j * pieceHeight);
                ctx.stroke();
            }
            
            ctx.strokeStyle = '#4f46e5';
            ctx.lineWidth = 3;
            ctx.strokeRect(boardX, boardY, boardWidth, boardHeight);

            // 2. Render Pieces
            pieces.forEach(piece => piece.draw());

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
